# Dev-only Postgres for the Go API.
#
# Run with: docker compose up -d
# Stop with: docker compose down
# Wipe data: docker compose down -v
#
# The default credentials match the DATABASE_URL in .env.example so a fresh
# clone can `docker compose up -d && npm run db:migrate && npm run dev:backend`
# without editing anything.
services:
  postgres:
    image: postgres:16-alpine
    container_name: hello-gutsyang-postgres
    environment:
      POSTGRES_USER: hello
      POSTGRES_PASSWORD: hello
      POSTGRES_DB: hello_gutsyang
    ports:
      - "5432:5432"
    volumes:
      - hello-gutsyang-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hello -d hello_gutsyang"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hello-gutsyang-pgdata:
